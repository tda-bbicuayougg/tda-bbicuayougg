<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    width="760"
    height="340"
    viewBox="0 0 760 340">

<defs>

    <style><![CDATA[
        .bg{
            fill:#0d1117;
        }

        .border{
            fill:none;
            stroke:#30363d;
            stroke-width:2;
            stroke-linecap:round;
            stroke-linejoin:round;
        }

        .header{
            fill:#f0f6fc;
            font-family:Consolas,'JetBrains Mono',monospace;
            font-size:22px;
            font-weight:bold;
        }

        .body{
            fill:#f0f6fc;
            font-family:Consolas,'JetBrains Mono',monospace;
            font-size:18px;
            white-space:pre;
        }

        .green{
            fill:#3fb950;
        }

        .blue{
            fill:#58a6ff;
        }

        .pink{
            fill:#ff7b72;
        }

    ]]></style>

    <!-- border animation -->

    <rect
        id="borderRect"
        x="8"
        y="8"
        width="744"
        height="324"
        rx="12"/>

</defs>

<!-- background -->

<rect
    class="bg"
    width="760"
    height="340"
    rx="12"/>

<!-- animated border -->

<use
    href="#borderRect"
    class="border"
    pathLength="100"
    stroke-dasharray="100"
    stroke-dashoffset="100">

    <animate
        attributeName="stroke-dashoffset"
        from="100"
        to="0"
        dur="1.4s"
        fill="freeze"/>

</use>

<!-- title -->

<text
    x="26"
    y="40"
    class="header">

<tspan class="green">bbicuayou</tspan>
<tspan>@</tspan>
<tspan class="blue">github</tspan>

</text>

<!-- divider -->

<line
    x1="22"
    y1="58"
    x2="738"
    y2="58"
    stroke="#30363d"
    stroke-width="1"/>

<!-- traffic lights -->

<circle cx="706" cy="35" r="5" fill="#ff5f56"/>
<circle cx="722" cy="35" r="5" fill="#ffbd2e"/>
<circle cx="738" cy="35" r="5" fill="#27c93f"/>

<!-- typing area -->

<g id="typing">
